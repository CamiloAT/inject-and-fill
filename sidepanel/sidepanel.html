<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormFilla Pro</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <span class="logo-icon">&#9998;</span>
      <h1>FormFilla Pro</h1>
    </div>
  </header>

  <main class="main">
    <div class="tabs">
      <button class="tab active" data-tab="profiles">Perfiles</button>
      <button class="tab" data-tab="fields">Campos</button>
      <button class="tab" data-tab="actions">Acciones</button>
    </div>

    <div class="tab-content active" id="tab-profiles">
      <div class="toolbar">
        <button id="btn-new-profile" class="btn btn-primary">+ Nuevo Perfil</button>
      </div>
      <div id="profiles-list" class="profiles-list"></div>
    </div>

    <div class="tab-content" id="tab-fields">
      <div class="toolbar">
        <button id="btn-detect-fields" class="btn btn-secondary">Detectar Campos</button>
        <label class="toggle-label">
          <input type="checkbox" id="auto-detect-toggle"> Auto-detectar
        </label>
      </div>
      <div id="detected-fields" class="fields-list"></div>
      <div id="no-fields-msg" class="empty-state">
        <p>No hay campos detectados</p>
        <p class="subtext">Haz clic en "Detectar Campos" o navega a un formulario</p>
      </div>
    </div>

    <div class="tab-content" id="tab-actions">
      <div class="actions-grid">
        <button id="btn-fill-active" class="btn btn-action">
          <span class="action-icon">&#9654;</span>
          Rellenar Perfil Activo
        </button>
        <button id="btn-reload" class="btn btn-action">
          <span class="action-icon">&#8635;</span>
          Recargar Pagina
        </button>
        <button id="btn-reload-cache" class="btn btn-action">
          <span class="action-icon">&#9881;</span>
          Recargar (Sin Cache)
        </button>
      </div>
      <div class="action-section">
        <h3>Navegar a URL</h3>
        <div class="url-input-group">
          <input type="url" id="nav-url" placeholder="https://ejemplo.com" class="input">
          <button id="btn-navigate" class="btn btn-secondary">Ir</button>
        </div>
      </div>
      <div class="action-section">
        <h3>Click en Elemento</h3>
        <div class="url-input-group">
          <input type="text" id="click-selector" placeholder="CSS selector (ej: #btn-enviar)" class="input">
          <button id="btn-click-elem" class="btn btn-secondary">Click</button>
        </div>
      </div>
      <div class="action-section">
        <h3>Configuracion de Relleno</h3>
        <div class="config-row">
          <label>Retraso entre campos (ms):</label>
          <input type="number" id="fill-delay" value="200" min="0" max="5000" class="input input-small">
        </div>
        <div class="config-row">
          <label>
            <input type="checkbox" id="sequential-fill" checked> Rellenar secuencialmente
          </label>
        </div>
      </div>
    </div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nuevo Perfil</h2>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn btn-secondary">Cancelar</button>
        <button id="modal-confirm" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="storage.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
